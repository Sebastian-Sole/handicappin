# Frozen rubric — `update-password`.
# Native: apps/native/app/(auth)/update-password.tsx (testID "update-password-screen").
# Web reference: /update-password, phone viewport. Web chrome not a finding.
screen: update-password
rubric_version: bring-up-v1
items:
  layout_structure:
    desc: >
      Narrow column: "Reset Password" heading, muted description, Email
      field, centered "Verification Code" label over a six-slot OTP strip,
      New Password + Confirm Password fields, full-width primary "Reset
      Password" button (disabled until 6 digits), then a bordered Tip alert.
  color_tokens:
    desc: >
      Auth-cluster palette; OTP strip bordered with input token on
      background; disabled CTA at reduced opacity; tip alert bordered on
      background.
    pairings_used:
      - body-on-page
      - muted-on-page
      - primary-foreground-on-primary
  type_hierarchy:
    desc: >
      H1 extra-bold; body muted description; small labels; meta tip text
      with bold "Tip:" lead-in. All Inter.
  components_present:
    desc: >
      Six joined OTP slots (~40px square, outer border, rounded ends,
      per-slot separators); three bordered inputs; full-width primary
      button; bordered alert box.
a11y:
  headings: [Reset Password]
  markers: [update-password-screen, update-password-email, update-password-otp, update-password-new, update-password-confirm, update-password-submit]
