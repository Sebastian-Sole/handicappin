      Auth-cluster palette; OTP strips bordered with the input token;
      disabled CTA reduced opacity; resend link primary; tip alert bordered.
    pairings_used:
      - body-on-page
      - muted-on-page
      - primary-foreground-on-primary
  type_hierarchy:
    desc: >
      H1 extra-bold; body muted description; small labels; meta hint and tip
      texts. All Inter.
  components_present:
    desc: >
      One bordered input with placeholder; two joined 3-slot OTP groups with
      a separator glyph between; primary CTA; link-style resend; alert box.
a11y:
  headings: [Verify Your Email]
  markers: [verify-signup-screen, verify-signup-email, verify-signup-otp, verify-signup-submit]
