# Frozen rubric — `index` (the authenticated HOME screen — replaced the
# token gallery, which retired to __gallery with its own rubric).
# Native: apps/native/app/(tabs)/index.tsx (testID "home-screen").
# Web reference: / signed in (phone viewport). Web navbar is not a finding;
# native's bottom tab bar is by design (ledger). Web's Performance Analytics
# charts section is desktop-only (hidden md:block) — absent on BOTH phone
# surfaces.
screen: index
rubric_version: bring-up-v1
items:
  layout_structure:
    desc: >
      Gradient hero: "Welcome back, <name>" heading + member-since line,
      centered HANDICAP INDEX eyebrow over the large figure, stacked
      full-width CTAs (primary "Log Round ›", outline "Dashboard"), then a
      2×2 stat grid (Handicap Index, Avg. Last 10, Best Round, Rounds
      Played). Below: Recent Activity card (timeline rows: status dot,
      course, date, Score/Diff, milestone + Best badges, View All link),
      2×2 quick-action cards, Journey to Scratch progress card, At a Glance
      card.
  color_tokens:
    desc: >
      Hero gradient from primary/accent alphas on background; stat cards on
      card token; achievement change-badges per web's recipe; Best badge
      tint-warning; activity dots chart-1/chart-5/destructive; primary CTA
      green with white label; tab bar on background with primary active tint.
    pairings_used:
      - body-on-page
      - muted-on-page
      - primary-foreground-on-primary
  type_hierarchy:
    desc: >
      heading-4 welcome; eyebrow-sm HANDICAP INDEX; figure-3xl index value;
      label-sm card titles; figure values in stat boxes; body-sm/meta
      supporting texts. All Inter.
  components_present:
    desc: >
      Large count-up handicap figure; two stacked CTAs; four stat boxes with
      icons + change badges + descriptions; activity feed rows with timeline
      dots and chevrons; four quick-action cards 2-per-row (Log Round tinted
      primary); progress bar card; At a Glance stat rows.
a11y:
  headings: [Welcome back]
  markers: [home-screen, activity-feed, hero-log-round, hero-dashboard, quick-action-log-round]
