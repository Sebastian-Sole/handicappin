# UTIL · sign out via Profile → Settings (drives the signed-out state the
# login/forgot-password flows require; mirror of auth-roundtrip's first half).
appId: com.handicappin.app
---
- stopApp
- openLink: handicappin://
- tapOn:
    text: "Open"
    optional: true
- extendedWaitUntil:
    visible:
      id: "tab-profile"
    timeout: 30000
- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible: "Manage your account settings"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "profile-tab-settings"
    direction: UP
    centerElement: true
- tapOn:
    id: "profile-tab-settings"
- scrollUntilVisible:
    element:
      id: "sign-out"
    centerElement: true
- tapOn:
    id: "sign-out"
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 20000
