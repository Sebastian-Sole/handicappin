# SMOKE · index — token-gallery bring-up screen renders, fonts resolved,
# gallery sections reachable by scroll.
# Selectors are accessible-name/testID based (never coordinate/index) — a
# selector that can't find a node is itself an a11y finding.
#
# appId: matches ios.bundleIdentifier in apps/native/app.json — keep in sync
# with verification/config.mjs SIM.appId (cross-referenced).
#
# PRE-REQUISITE (quality gate): Expo dev server + iOS simulator already running
# and the app installed. This flow does NOT auto-start them — an auto-started
# server masks a broken launch instead of catching it.
appId: com.handicappin.app
---
# The gallery retired to the native-only __gallery route when home took
# over "/" — deep link to it (launchApp alone would land on home).
- openLink: handicappin://__gallery
- tapOn:
    text: "Open"
    optional: true
# Gallery heading doubles as the font-ready signal (zero-size markers are
# not Maestro-visible; the capture gate checks fonts-ready itself).
- extendedWaitUntil:
    visible: 'Token gallery'
    timeout: 30000

# Section headings in order — also the glyph/no-tofu proxy (Inter 600/800).
- assertVisible: 'Colors'
- assertVisible: 'Typography'

# Surfaces sit below the fold on a phone — reach them by scrolling, then assert.
- scrollUntilVisible:
    element:
      id: 'gallery-surfaces'
- assertVisible:
    id: 'gallery-surfaces'
