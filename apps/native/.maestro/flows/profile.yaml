# PROFILE (Profile tab) · personal info with real data; billing shows the
# REAL plan with the mocked restore surfacing its labelled dev notice;
# settings hosts password/calculators/legal/sign-out.
# PRE-REQUISITE: signed in as the (unlimited) test user.
appId: com.handicappin.app
---
- openLink: handicappin://
- tapOn:
    text: "Open"
    optional: true
- extendedWaitUntil:
    visible:
      id: "tab-profile"
    timeout: 30000
- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible: "Manage your account settings"
    timeout: 20000
- scrollUntilVisible:
    element:
      text: "Manage your account settings"
    direction: UP
    timeout: 20000
- assertVisible: "Personal Information"
- assertVisible: "Native Tester"
# Billing: real plan state + mocked restore notice.
- tapOn:
    id: "profile-tab-billing"
- extendedWaitUntil:
    visible: ".*[Uu]nlimited Plan.*"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "Restore Purchases"
    centerElement: true
- tapOn: "Restore Purchases"
- extendedWaitUntil:
    visible: ".*purchases are mocked.*"
    timeout: 10000
# Settings: tools present.
- scrollUntilVisible:
    element:
      id: "profile-tab-settings"
    direction: UP
    centerElement: true
- tapOn:
    id: "profile-tab-settings"
- scrollUntilVisible:
    element:
      text: "Handicap Calculators"
- scrollUntilVisible:
    element:
      id: "sign-out"
