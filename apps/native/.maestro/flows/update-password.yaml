# UPDATE-PASSWORD · renders; submit is gated on a 6-digit code; zod surfaces
# the password-length error. The real OTP loop is out of scope (handoff §7b:
# email verification is exercised for STRUCTURE; no real emails).
appId: com.handicappin.app
---
- openLink: handicappin://update-password
- tapOn:
    text: "Open"
    optional: true
- assertVisible: "Reset Password"
- assertVisible: "Verification Code"
- tapOn:
    id: "update-password-email"
- inputText: "native-goal-test@handicappin.local"
- pressKey: Enter
- tapOn:
    id: "update-password-otp"
- inputText: "123456"
- pressKey: Enter
- tapOn:
    id: "update-password-new"
- inputText: "short"
- pressKey: Enter
- tapOn:
    id: "update-password-confirm"
- inputText: "short"
- pressKey: Enter
- scrollUntilVisible:
    element:
      id: "update-password-submit"
- tapOn:
    id: "update-password-submit"
- extendedWaitUntil:
    visible: "Password must be at least 8 characters"
    timeout: 8000
