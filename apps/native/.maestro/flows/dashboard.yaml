# DASHBOARD (Rounds tab) · real scorecard history renders; search filters;
# the natively-added round is present.
# PRE-REQUISITE: signed in as the (unlimited) test user.
appId: com.handicappin.app
---
- openLink: handicappin://
- tapOn:
    text: "Open"
    optional: true
- extendedWaitUntil:
    visible:
      id: "tab-rounds"
    timeout: 30000
- tapOn:
    id: "tab-rounds"
# Anchor at the top first (dev-client restores scroll state), then walk
# the sections — "Rounds History" is below the first viewport.
- extendedWaitUntil:
    visible: "Current Handicap"
    timeout: 15000
- scrollUntilVisible:
    element: "Current Handicap"
    direction: UP
    optional: true
- assertVisible: "Handicap"
- scrollUntilVisible:
    element: "Recent Rounds"
- scrollUntilVisible:
    element: "Rounds History"
- scrollUntilVisible:
    element:
      id: "rounds-search"
- tapOn:
    id: "rounds-search"
- inputText: "St. Andrews"
- pressKey: Enter
- assertVisible: ".*St. Andrews Old Co.*"
