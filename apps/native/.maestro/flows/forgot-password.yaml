# FORGOT-PASSWORD · renders and validates email format client-side (the OTP
# email path is exercised manually against Mailpit; never against real inboxes).
appId: com.handicappin.app
---
- openLink: handicappin://forgot-password
- tapOn:
    text: "Open"
    optional: true
- assertVisible: "Reset Password"
- tapOn:
    id: "forgot-password-email"
- inputText: "not-an-email"
- pressKey: Enter
- tapOn:
    id: "forgot-password-submit"
- extendedWaitUntil:
    visible: "Please enter a valid email"
    timeout: 8000
